recognized_file: '#ebdbb2' # fg1
executable_file: '#8ec07c' # Aqua
dir: '#83a598' # Blue

# Link
dead_link: '#fb4934' # Red
link: '#8ec07c' # Aqua

# Special Files
socket: '#458588' # Dark Blue
blockdev: '#458588' # Dark Blue
chardev: '#458588' # Dark Blue

# Access Modes
write: '#fe8019' # Orange
read: '#b8bb26' # Green
exec: '#458588' # Dark Blue
