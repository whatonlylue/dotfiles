# File Size
file_large: '#fb4934' # Red
file_medium: '#d79921' # Yellow
file_small: '#fe8019' # Orange

# Random
report: '#fe8019' # Orange
user: '#8ec07c' # Aqua
tree: '#3c3836' # bg1
empty: '#928374' # Dark Gray
error: '#fb4934' # Red
normal: '#ebdbb2' # fg1

# Git
addition: '#b8bb26' # Green
modification: '#d3869b' # Purple
